<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>80s Snake Project</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00FF00; /* Retro green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #555;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        /* The Paragraph Overlay */
        #overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00FF00;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px #00FF00;
            z-index: 10;
        }

        #overlay p {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #fff;
        }

        button {
            background-color: #00FF00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <h1>SNAKE: THE 80s PROJECT</h1>
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div id="overlay">
            <p id="paragraph-text"></p>
            <button onclick="resumeGame()">Continue Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const paraText = document.getElementById("paragraph-text");

        const box = 20;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let d;
        let gamePaused = false;
        let currentParaIndex = 0;

        // Your paragraphs
        const paragraphs = [
            "Top Gun: (Insert your full paragraph here...)",
            "Star Wars: (Insert your full paragraph here...)",
            "Michael Jordan: (Insert your full paragraph here...)",
            "Michael Jackson: (Insert your full paragraph here...)",
            "Atari: (Insert your full paragraph here...)",
            "Air Jordan: (Insert your full paragraph here...)"
        ];

        document.addEventListener("keydown", direction);

        function direction(event) {
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            if (gamePaused) return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "green" : "lime";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Check if food is eaten
            if (snakeX == food.x && snakeY == food.y) {
                // Trigger the prompt
                if (currentParaIndex < paragraphs.length) {
                    showPrompt(paragraphs[currentParaIndex]);
                    currentParaIndex++;
                }
                
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over conditions
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Refresh to try again.");
            }

            snake.unshift(newHead);
        }

        function showPrompt(text) {
            gamePaused = true;
            paraText.innerText = text;
            overlay.style.display = "block";
        }

        function resumeGame() {
            gamePaused = false;
            overlay.style.display = "none";
        }

        let game = setInterval(draw, 120);
    </script>
</body>
</html>
