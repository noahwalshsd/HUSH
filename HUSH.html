<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - Defender with Images</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; border: 3px solid #333; box-shadow: 0 0 20px #00ffff; }
        
        /* Updated Overlay to fit images */
        #overlay { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 75%; 
            background: rgba(0, 0, 0, 0.98); border: 2px solid #00ffff; 
            padding: 20px; text-align: center; z-index: 20; 
        }

        #overlay img {
            max-width: 100%;
            max-height: 200px; /* Limits height so text still fits */
            border: 2px solid #ff00ff;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #overlay h2 { color: #ff00ff; margin: 0 0 10px 0; font-size: 1.8rem; }
        #overlay p { color: #fff; font-size: 1.1rem; line-height: 1.4; margin-bottom: 10px; }
        .stats { font-size: 1.5rem; color: #ff00ff; margin-bottom: 10px; width: 800px; display: flex; justify-content: space-between; }
        #flash { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; transition: opacity 0.1s; }
    </style>
</head>
<body>

    <div class="stats">
        <span>LIVES: <span id="lives">3</span></span>
        <span>HUSH DATA: <span id="data">0/6</span></span>
    </div>
    <div id="game-container">
        <canvas id="defCanvas" width="800" height="600"></canvas>
        <div id="flash"></div>
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <img id="topic-image" src="" alt="80s Icon">
            <p id="paragraph-text"></p>
            <div style="color:#00ffff; font-weight:bold;">PRESS SPACE TO CONTINUE</div>
        </div>
    </div>

    <script>
    window.onload = function() {
        const canvas = document.getElementById("defCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const topicImg = document.getElementById("topic-image");
        const flash = document.getElementById("flash");

        let ship = { x: 100, y: 300, vx: 0, vy: 0, dir: 1, w: 30, h: 15 };
        let aliens = [], bullets = [], enemyBullets = [], lives = 3, score = 0, gameState = "PLAYING";

        // ADD YOUR IMAGE FILENAMES HERE
        const content = [
            { title: "Top Gun", text: "Paragraph text...", img: "download.jpg" },
            { title: "Star Wars", text: "Paragraph text...", img: "starwars.jpg" },
            { title: "Michael Jordan", text: "Michael Jordan was a professional basketball player who was a 6 time championship winner with the Chicago Bulls. He won the regular season MVP 5 times and won the postseason MVP 6 times. He is commonly regarded as the greatest basketball player ever. He earned $90 million through his salary and earned $2.4 billion (pre-tax) from sponsorships. He is also well known for the Nike basketball shoes built around him." <br> "Michael Jordan is and was insanely famous. He earned his way to become the GOAT of basketball. If he were to play today, he would make a fool of the current players. He was definitely the best and most famous in a time when basketball was a much greater sport. He made basketball more famous; a player was so iconic that he made the sport he played more famous.", img: "jordan.jpg" },
            { title: "Michael Jackson", text: "Michael Jackson was the King of Pop. He was an insane perfectionist who delivered some of the best pop music ever released. He currently holds 4 of the 100 most listened to songs of the 80s on Spotify, those being, in order: Billie Jean, Smooth Criminal, Thriller, and The Way You Make Me Feel. He began as the child prodigy of the Jackson 5, but outgrew them and became a spectacle. He was “an enigma” with the rare talent of “[commanding] tears and… make people faint.” Michael Jackson was such a perfectionist, such an enigma, such an artist. He attracted so many people to his music and his concerts. He put on a show every time and gave some of the best music ever. He was the King of Pop, and earned every bit of it. He is just one of those artists that I wish I could wind back time and visit one of his concerts.", img: "jackson.jpg" },
            { title: "Atari", text: "Atari was the leader of the gaming revolution of the 1980s. The Atari featured groundbreaking technology, recognized titles, and vibrant colors. Atari rode on its 1970s success. It held many mall arcades that attracted millions and sold many of their products. Atari’s strengths came through its amazing games. The games demanded intense focus, good reactions, and experience. One of the games was Defender (1981), the game I modeled this website after. I have an updated (though still classic) Atari console. The games are amazing, and I cannot believe how strong the 80s were in gaming. With their Pac-Man, Frogger, Asteroids, Pong, and Space Invaders, the 80s were amazing for gaming. To lead gaming in such a critical time and to still have an impact is such an indicator of success. It really was iconic.", img: "atari.jpg" },
            { title: "Air Jordan", text: "Paragraph text...", img: "airjordans.jpg" }
        ];

        function spawnAliens() {
            aliens = [];
            for(let i=0; i<6; i++) {
                aliens.push({ 
                    x: 400 + Math.random()*350, 
                    y: Math.random()*550, 
                    vx: (Math.random()-0.5)*3, 
                    vy: (Math.random()-0.5)*3 
                });
            }
        }

        const keys = {};
        window.onkeydown = (e) => { 
            keys[e.code] = true; 
            if(e.code === "Space" && gameState === "PAUSED") resume();
            if(e.code === "Space" && gameState === "GAMEOVER") location.reload();
            if(e.code === "ShiftLeft" || e.code === "ShiftRight") {
                if(gameState === "PLAYING") bullets.push({x: ship.x + (ship.dir === 1 ? 30 : 0), y: ship.y+7, vx: ship.dir*8});
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if(gameState !== "PLAYING") return;

            if(keys["ArrowUp"]) ship.vy -= 0.5;
            if(keys["ArrowDown"]) ship.vy += 0.5;
            if(keys["ArrowLeft"]) { ship.vx -= 0.5; ship.dir = -1; }
            if(keys["ArrowRight"]) { ship.vx += 0.5; ship.dir = 1; }

            ship.vx *= 0.95; ship.vy *= 0.95; 
            ship.x += ship.vx; ship.y += ship.vy;

            if(ship.x < 0) ship.x = canvas.width;
            if(ship.x > canvas.width) ship.x = 0;
            if(ship.y < 0) { ship.y = 0; ship.vy = 0; }
            if(ship.y > canvas.height-ship.h) { ship.y = canvas.height-ship.h; ship.vy = 0; }

            aliens.forEach((a, ai) => {
                a.x += a.vx; a.y += a.vy;
                if(a.x < 0 || a.x > canvas.width) a.vx *= -1;
                if(a.y < 0 || a.y > canvas.height-20) a.vy *= -1;

                if(Math.random() < 0.008) { // Your 5% adjustment
                    enemyBullets.push({x: a.x, y: a.y, vx: (ship.x - a.x)*0.006, vy: (ship.y - a.y)*0.008}); // Your .006 adjustment
                }

                if(Math.hypot(ship.x - a.x, ship.y - a.y) < 25) hit();
            });

            bullets.forEach((b, bi) => {
                b.x += b.vx;
                aliens.forEach((a, ai) => {
                    if(Math.hypot(b.x - a.x, b.y - a.y) < 25) {
                        bullets.splice(bi, 1);
                        aliens.splice(ai, 1);
                        showData();
                    }
                });
            });

            enemyBullets.forEach((eb, ebi) => {
                eb.x += eb.vx; eb.y += eb.vy;
                if(Math.hypot(ship.x - eb.x, ship.y - eb.y) < 18) {
                    enemyBullets.splice(ebi, 1);
                    hit();
                }
            });

            render();
            requestAnimationFrame(update);
        }

        function hit() {
            lives--;
            document.getElementById("lives").innerText = lives;
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 150);
            ship.x = 100; ship.y = 300; ship.vx = 0; ship.vy = 0;
            if(lives <= 0) {
                gameState = "GAMEOVER";
                topicImg.style.display = "none"; // Hide image on game over
                document.getElementById("topic-title").innerText = "MISSION FAILED";
                document.getElementById("paragraph-text").innerText = "THE DATA HAS BEEN ENCRYPTED. PRESS SPACE TO REBOOT.";
                overlay.style.display = "block";
            }
        }

        function showData() {
            gameState = "PAUSED";
            score++;
            const currentItem = content[score-1];
            document.getElementById("data").innerText = score + "/6";
            document.getElementById("topic-title").innerText = currentItem.title;
            document.getElementById("paragraph-text").innerText = currentItem.text;
            
            // Update and show the image
            topicImg.src = currentItem.img;
            topicImg.style.display = "block";
            
            overlay.style.display = "block";
        }

        function resume() {
            overlay.style.display = "none";
            if(score === 6) {
                gameState = "WON";
                topicImg.style.display = "none";
                document.getElementById("topic-title").innerText = "Victory!";
                document.getElementById("paragraph-text").innerText = "You have zoomed through the 80s and captured its best; Nike is also the godess of victory.";
                overlay.style.display = "block";
            } else {
                gameState = "PLAYING";
                update();
            }
        }

        function render() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(ship.x, ship.y, ship.w, ship.h);
            ctx.fillStyle = "red";
            ctx.fillRect(ship.x + (ship.dir === 1 ? 25 : -5), ship.y+4, 10, 7);
            aliens.forEach(a => {
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath(); ctx.arc(a.x, a.y, 12, 0, 7); ctx.fill();
            });
            ctx.fillStyle = "white";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 20, 3));
            ctx.fillStyle = "red";
            enemyBullets.forEach(eb => {
                ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, 7); ctx.fill();
            });
        }

        spawnAliens();
        update();
    };
    </script>
</body>
</html>
