<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - 80s Project</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { font-size: 3rem; text-shadow: 3px 3px #00ffff; margin-bottom: 10px; }

        #game-container { position: relative; border: 5px solid #00ffff; box-shadow: 0 0 20px #ff00ff; }
        canvas { display: block; background-color: #000; }

        #overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff00ff;
            padding: 25px;
            text-align: center;
            z-index: 10;
        }

        #overlay h2 { color: #00ffff; margin-top: 0; text-transform: uppercase; }
        #overlay p { color: #fff; line-height: 1.6; font-size: 1.1rem; }
        .instruction { color: #00ffff; font-weight: bold; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>HUSH</h1>
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <p id="paragraph-text"></p>
            <div id="status-msg" class="instruction">PRESS SPACE TO CONTINUE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const paraText = document.getElementById("paragraph-text");
        const topicTitle = document.getElementById("topic-title");
        const statusMsg = document.getElementById("status-msg");

        const box = 20;
        let snake, food, d, gamePaused, applesEaten, currentParaIndex, gameState;

        const content = [
            { title: "Top Gun", text: "Insert your Top Gun paragraph here..." },
            { title: "Star Wars", text: "Insert your Star Wars paragraph here..." },
            { title: "Michael Jordan", text: "Insert your Michael Jordan paragraph here..." },
            { title: "Michael Jackson", text: "Insert your Michael Jackson paragraph here..." },
            { title: "Atari", text: "Insert your Atari paragraph here..." },
            { title: "Air Jordan", text: "Insert your Air Jordan paragraph here..." }
        ];

        function init() {
            snake = [{ x: 9 * box, y: 10 * box }];
            food = { x: 5 * box, y: 5 * box };
            d = "RIGHT";
            gamePaused = false;
            applesEaten = 0;
            currentParaIndex = 0;
            gameState = "PLAYING";
            overlay.style.display = "none";
        }

        document.addEventListener("keydown", handleInput);

        function handleInput(event) {
            // Movement
            if (gameState === "PLAYING") {
                if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
                else if (event.keyCode == 38 && d != "DOWN") d = "UP";
                else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
                else if (event.keyCode == 40 && d != "UP") d = "DOWN";
            }
            
            // Space Bar Logic
            if (event.keyCode == 32) {
                if (gameState === "PAUSED") {
                    resumeGame();
                } else if (gameState === "GAMEOVER" || gameState === "WON") {
                    init();
                }
            }
        }

        function draw() {
            if (gameState !== "PLAYING") return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ffff" : "#ff00ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#fff"; // Apple
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                applesEaten++;
                
                // Trigger every 2 apples
                if (applesEaten % 2 === 0 && currentParaIndex < content.length) {
                    showPrompt(content[currentParaIndex]);
                    currentParaIndex++;
                }
                
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                gameOver();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function showPrompt(obj) {
            gameState = "PAUSED";
            topicTitle.innerText = obj.title;
            paraText.innerText = obj.text;
            statusMsg.innerText = "PRESS SPACE TO CONTINUE";
            overlay.style.display = "block";
        }

        function resumeGame() {
            // Check if that was the last paragraph
            if (currentParaIndex === content.length) {
                winGame();
            } else {
                gameState = "PLAYING";
                overlay.style.display = "none";
            }
        }

        function gameOver() {
            gameState = "GAMEOVER";
            topicTitle.innerText = "GAME OVER";
            paraText.innerText = "You hit a wall or yourself!";
            statusMsg.innerText = "PRESS SPACE TO RETRY";
            overlay.style.display = "block";
        }

        function winGame() {
            gameState = "WON";
            topicTitle.innerText = "YOU WON!";
            paraText.innerText = "You have completed the HUSH 80s History challenge.";
            statusMsg.innerText = "PRESS SPACE TO PLAY AGAIN";
            overlay.style.display = "block";
        }

        init();
        let game = setInterval(draw, 100);
    </script>
</body>
</html>
