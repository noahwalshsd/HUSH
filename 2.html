<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - Defender Challenge</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff; margin: 10px; }
        #game-container { position: relative; border: 2px solid #555; background: #000; }
        #overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0, 0, 0, 0.95); border: 2px solid #00ffff; padding: 20px; text-align: center; z-index: 20; }
        #overlay h2 { color: #ff00ff; margin-top: 0; }
        .controls { color: #555; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>HUSH: DEFENDER</h1>
    <div id="game-container">
        <canvas id="defCanvas" width="600" height="400"></canvas>
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <p id="paragraph-text"></p>
            <div style="color:#00ffff; font-weight:bold;">PRESS SPACE TO RESUME</div>
        </div>
    </div>
    <div class="controls">ARROWS: Fly | SHIFT: Fire | GOAL: Destroy 6 Red Aliens</div>

    <script>
    window.onload = function() {
        const canvas = document.getElementById("defCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const paraText = document.getElementById("paragraph-text");
        const topicTitle = document.getElementById("topic-title");

        let ship = { x: 100, y: 200, vx: 0, vy: 0, dir: 1 };
        let aliens = [], bullets = [], stars = [];
        let gameState = "PLAYING", currentParaIndex = 0;

        const content = [
            { title: "Top Gun", text: "Paragraph text..." },
            { title: "Star Wars", text: "Paragraph text..." },
            { title: "Michael Jordan", text: "Paragraph text..." },
            { title: "Michael Jackson", text: "Paragraph text..." },
            { title: "Atari", text: "Paragraph text..." },
            { title: "Air Jordan", text: "Paragraph text..." }
        ];

        function init() {
            aliens = [];
            for(let i=0; i<6; i++) {
                aliens.push({ x: Math.random()*canvas.width, y: Math.random()*(canvas.height-100), vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 });
            }
            stars = [];
            for(let i=0; i<50; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }

        const keys = {};
        window.onkeydown = (e) => { 
            keys[e.code] = true; 
            if(e.code === "Space" && gameState === "PAUSED") resume();
            if(e.code === "ShiftLeft" || e.code === "ShiftRight") {
                if(gameState === "PLAYING") bullets.push({x: ship.x + (ship.dir*20), y: ship.y+5, vx: ship.dir*10});
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if(gameState !== "PLAYING") return;

            // Physics
            if(keys["ArrowUp"]) ship.vy -= 0.5;
            if(keys["ArrowDown"]) ship.vy += 0.5;
            if(keys["ArrowLeft"]) { ship.vx -= 0.5; ship.dir = -1; }
            if(keys["ArrowRight"]) { ship.vx += 0.5; ship.dir = 1; }

            ship.vx *= 0.95; ship.vy *= 0.95; // Friction
            ship.x += ship.vx; ship.y += ship.vy;

            // Screen Wrap
            if(ship.x > canvas.width) ship.x = 0;
            if(ship.x < 0) ship.x = canvas.width;
            if(ship.y < 0) ship.y = 0;
            if(ship.y > canvas.height-50) ship.y = canvas.height-50;

            // Update Aliens
            aliens.forEach((a, i) => {
                a.x += a.vx; a.y += a.vy;
                if(a.x > canvas.width || a.x < 0) a.vx *= -1;
                if(a.y > canvas.height-100 || a.y < 0) a.vy *= -1;

                // Ship Collision
                let dist = Math.hypot(ship.x - a.x, ship.y - a.y);
                if(dist < 20) resetShip();
            });

            // Update Bullets
            bullets.forEach((b, bi) => {
                b.x += b.vx;
                aliens.forEach((a, ai) => {
                    if(Math.hypot(b.x - a.x, b.y - a.y) < 20) {
                        bullets.splice(bi, 1);
                        aliens.splice(ai, 1);
                        triggerPara();
                    }
                });
            });
            render();
            requestAnimationFrame(update);
        }

        function triggerPara() {
            gameState = "PAUSED";
            topicTitle.innerText = content[currentParaIndex].title;
            paraText.innerText = content[currentParaIndex].text;
            currentParaIndex++;
            overlay.style.display = "block";
        }

        function resume() {
            overlay.style.display = "none";
            if(currentParaIndex === 6) {
                alert("MISSION COMPLETE: YOU SAVED THE 80s");
                location.reload();
            } else {
                gameState = "PLAYING";
                update();
            }
        }

        function resetShip() {
            ship.x = 100; ship.y = 200; ship.vx = 0; ship.vy = 0;
        }

        function render() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = "white";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            // Mountains
            ctx.strokeStyle = "#555";
            ctx.beginPath();
            ctx.moveTo(0, 350); ctx.lineTo(100, 300); ctx.lineTo(200, 350); ctx.lineTo(300, 250); ctx.lineTo(450, 350); ctx.lineTo(600, 280);
            ctx.stroke();

            // Ship (Defender Style)
            ctx.fillStyle = "white";
            ctx.fillRect(ship.x, ship.y, 20, 10);
            ctx.fillStyle = "red";
            ctx.fillRect(ship.x + (ship.dir === 1 ? 15 : -5), ship.y+2, 10, 6);

            // Aliens
            aliens.forEach(a => {
                ctx.fillStyle = "#0f0";
                ctx.beginPath(); ctx.arc(a.x, a.y, 10, 0, 7); ctx.fill();
                ctx.fillStyle = "red"; ctx.fillRect(a.x-4, a.y-4, 8, 8);
            });

            // Bullets
            ctx.fillStyle = "#0ff";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 2));
        }

        init();
        update();
    };
    </script>
</body>
</html>
