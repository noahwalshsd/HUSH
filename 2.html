<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSH - 80s Pop Culture</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ff00ff; /* Neon Pink */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 3px 3px #00ffff; /* Cyber Blue shadow */
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            border: 5px solid #00ffff;
            box-shadow: 0 0 20px #ff00ff;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        /* The Paragraph Pop-up */
        #overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: rgba(15, 15, 15, 0.95);
            border: 3px solid #ff00ff;
            padding: 30px;
            text-align: center;
            z-index: 10;
        }

        #overlay h2 { color: #00ffff; margin-top: 0; }
        #overlay p { color: #fff; line-height: 1.6; font-size: 1.1rem; }

        button {
            background-color: #00ffff;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { background-color: #fff; }
    </style>
</head>
<body>

    <h1>HUSH</h1>
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <p id="paragraph-text"></p>
            <button onclick="resumeGame()">Resume Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const paraText = document.getElementById("paragraph-text");
        const topicTitle = document.getElementById("topic-title");

        const box = 20;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: 5 * box, y: 5 * box };
        let d = "RIGHT";
        let gamePaused = false;
        let score = 0;

        // --- PASTE YOUR TYPED WORDS HERE ---
        const content = [
            { title: "Top Gun", text: "Replace this with your Top Gun paragraph." },
            { title: "Star Wars", text: "Replace this with your Star Wars paragraph." },
            { title: "Michael Jordan", text: "Replace this with your Michael Jordan paragraph." },
            { title: "Michael Jackson", text: "Replace this with your Michael Jackson paragraph." },
            { title: "Atari", text: "Replace this with your Atari paragraph." },
            { title: "Air Jordan", text: "Replace this with your Air Jordan paragraph." }
        ];

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(gamePaused) return;
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            if (gamePaused) return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ffff" : "#ff00ff";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            // Draw Apple
            ctx.fillStyle = "#fff";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                // Trigger Milestone
                if (score < content.length) {
                    showPrompt(content[score]);
                    score++;
                }
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Wall/Self Collision
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                alert("Game Over! Try again for the next paragraph.");
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function showPrompt(obj) {
            gamePaused = true;
            topicTitle.innerText = obj.title;
            paraText.innerText = obj.text;
            overlay.style.display = "block";
        }

        function resumeGame() {
            gamePaused = false;
            overlay.style.display = "none";
        }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
