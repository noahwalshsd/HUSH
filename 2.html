<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - Hardcore Edition</title>
    <style>
        body { background-color: #050505; color: #ffcc00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { font-size: 3rem; color: #ff0000; text-shadow: 2px 2px #fff; margin: 10px; }
        #game-outer { position: relative; padding: 10px; background: #333; border-radius: 10px; border: 4px solid #555; }
        canvas { display: block; background-color: #1a0f0a; }
        #overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0, 0, 0, 0.95); border: 4px solid #ffcc00; padding: 20px; text-align: center; z-index: 20; color: white; }
        .stats { position: absolute; top: -40px; width: 100%; display: flex; justify-content: space-between; font-weight: bold; color: #00ffff; }
    </style>
</head>
<body>

    <h1>HUSH</h1>
    <div id="game-outer">
        <div class="stats">
            <span>LIVES: <span id="lives-val">3</span></span>
            <span>MONSTERS: <span id="monst-val">6</span></span>
        </div>
        <canvas id="digDugCanvas" width="440" height="440"></canvas>
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <p id="paragraph-text"></p>
            <div class="instruction">PRESS SPACE TO CONTINUE</div>
        </div>
    </div>

    <script>
    window.onload = function() {
        const canvas = document.getElementById("digDugCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const paraText = document.getElementById("paragraph-text");
        const topicTitle = document.getElementById("topic-title");

        const tileSize = 40;
        const gridRes = 11;
        let player, monsters, dirt, gameState, currentParaIndex, lives;

        const content = [
            { title: "Top Gun", text: "Paragraph text here..." },
            { title: "Star Wars", text: "Paragraph text here..." },
            { title: "Michael Jordan", text: "Paragraph text here..." },
            { title: "Michael Jackson", text: "Paragraph text here..." },
            { title: "Atari", text: "Paragraph text here..." },
            { title: "Air Jordan", text: "Paragraph text here..." }
        ];

        function init(resetFull = true) {
            if(resetFull) {
                currentParaIndex = 0;
                lives = 3;
                dirt = Array.from({length: gridRes}, () => Array(gridRes).fill(true));
                for(let j=0; j<4; j++) dirt[5][j] = false;
                monsters = [{x:2,y:3,hp:3},{x:8,y:3,hp:3},{x:2,y:7,hp:3},{x:8,y:7,hp:3},{x:5,y:9,hp:3},{x:1,y:9,hp:3}];
            }
            player = { x: 5, y: 0, dir: 'down' };
            gameState = "PLAYING";
            overlay.style.display = "none";
            updateUI();
            render();
        }

        function updateUI() {
            document.getElementById("lives-val").innerText = lives;
            document.getElementById("monst-val").innerText = monsters.length;
        }

        function moveMonsters() {
            if(gameState !== "PLAYING") return;
            monsters.forEach(m => {
                // Ghost logic: Monsters can move through dirt slowly, or fast through tunnels
                let dx = player.x - m.x;
                let dy = player.y - m.y;
                if(Math.random() > 0.7) { // AI Delay to make it winnable
                    if(Math.abs(dx) > Math.abs(dy)) m.x += Math.sign(dx);
                    else m.y += Math.sign(dy);
                }
                if(m.x === player.x && m.y === player.y) die();
            });
            render();
        }

        function die() {
            lives--;
            if(lives <= 0) {
                gameState = "GAMEOVER";
                topicTitle.innerText = "GAME OVER";
                paraText.innerText = "The 80s legends were too much for you!";
                overlay.style.display = "block";
            } else {
                init(false);
            }
        }

        document.addEventListener("keydown", (e) => {
            if(gameState === "PAUSED" && e.keyCode === 32) { resumeGame(); return; }
            if(gameState === "GAMEOVER" && e.keyCode === 32) { init(true); return; }
            if(gameState !== "PLAYING") return;

            if(e.key.startsWith("Arrow")) {
                if(e.key === "ArrowUp" && player.y > 0) player.y--;
                if(e.key === "ArrowDown" && player.y < gridRes-1) player.y++;
                if(e.key === "ArrowLeft" && player.x > 0) player.x--;
                if(e.key === "ArrowRight" && player.x < gridRes-1) player.x++;
                dirt[player.x][player.y] = false;
                moveMonsters();
            }

            if(e.code === "ShiftLeft" || e.code === "ShiftRight") {
                // Fire Pump
                monsters.forEach((m, i) => {
                    let dist = Math.abs(m.x - player.x) + Math.abs(m.y - player.y);
                    if(dist <= 2) { // Range of pump
                        m.hp--;
                        if(m.hp <= 0) {
                            monsters.splice(i, 1);
                            showPrompt(content[currentParaIndex]);
                            currentParaIndex++;
                        }
                    }
                });
            }
            render();
        });

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<gridRes; i++) {
                for(let j=0; j<gridRes; j++) {
                    if(dirt[i][j]) {
                        ctx.fillStyle = j < 5 ? "#d35400" : "#a04000";
                        ctx.fillRect(i*tileSize, j*tileSize, tileSize, tileSize);
                    }
                }
            }
            monsters.forEach(m => {
                ctx.fillStyle = m.hp === 1 ? "white" : "red"; // Flashes white when almost dead
                ctx.beginPath(); ctx.arc(m.x*tileSize+20, m.y*tileSize+20, 15 - (m.hp*2), 0, 7); ctx.fill();
            });
            ctx.fillStyle = "yellow";
            ctx.fillRect(player.x*tileSize+10, player.y*tileSize+10, 20, 20);
        }

        function showPrompt(obj) {
            gameState = "PAUSED";
            topicTitle.innerText = obj.title;
            paraText.innerText = obj.text;
            overlay.style.display = "block";
            updateUI();
        }

        function resumeGame() {
            if(currentParaIndex === 6) {
                gameState = "WON";
                topicTitle.innerText = "CHAMPION";
                paraText.innerText = "You conquered the 80s!";
                overlay.style.display = "block";
            } else {
                gameState = "PLAYING";
                overlay.style.display = "none";
            }
        }

        init();
    };
    </script>
</body>
</html>
