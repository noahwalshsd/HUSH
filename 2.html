<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - Defender Balanced</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        /* Larger Game Window */
        #game-container { position: relative; border: 3px solid #333; box-shadow: 0 0 20px #00ffff; }
        #overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; background: rgba(0, 0, 0, 0.95); border: 2px solid #00ffff; padding: 30px; text-align: center; z-index: 20; }
        .stats { font-size: 1.5rem; color: #ff00ff; margin-bottom: 10px; width: 800px; display: flex; justify-content: space-between; }
        #flash { pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; transition: opacity 0.1s; }
    </style>
</head>
<body>

    <div class="stats">
        <span>LIVES: <span id="lives">3</span></span>
        <span>HUSH DATA: <span id="data">0/6</span></span>
    </div>
    <div id="game-container">
        <canvas id="defCanvas" width="800" height="600"></canvas>
        <div id="flash"></div>
        <div id="overlay">
            <h2 id="topic-title" style="color:#ff00ff"></h2>
            <p id="paragraph-text" style="font-size: 1.2rem; line-height: 1.5;"></p>
            <div style="color:#00ffff; font-weight:bold; margin-top:20px;">PRESS SPACE TO CONTINUE</div>
        </div>
    </div>
    <p style="color: #666; margin-top: 10px;">ARROWS: MOVE | SHIFT: LASER | SPACE: RESUME</p>

    <script>
    window.onload = function() {
        const canvas = document.getElementById("defCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const flash = document.getElementById("flash");

        let ship = { x: 100, y: 300, vx: 0, vy: 0, dir: 1, w: 30, h: 15 };
        let aliens = [], bullets = [], enemyBullets = [], lives = 3, score = 0, gameState = "PLAYING";

        const content = [
            { title: "Top Gun", text: "Replace this with your Top Gun content." },
            { title: "Star Wars", text: "Replace this with your Star Wars content." },
            { title: "Michael Jordan", text: "Replace this with your Michael Jordan content." },
            { title: "Michael Jackson", text: "Replace this with your Michael Jackson content." },
            { title: "Atari", text: "Replace this with your Atari content." },
            { title: "Air Jordan", text: "Replace this with your Air Jordan content." }
        ];

        function spawnAliens() {
            aliens = [];
            for(let i=0; i<6; i++) {
                aliens.push({ 
                    x: 400 + Math.random()*350, 
                    y: Math.random()*550, 
                    vx: (Math.random()-0.5)*3, // Slower alien movement
                    vy: (Math.random()-0.5)*3 
                });
            }
        }

        const keys = {};
        window.onkeydown = (e) => { 
            keys[e.code] = true; 
            if(e.code === "Space" && gameState === "PAUSED") resume();
            if(e.code === "Space" && gameState === "GAMEOVER") location.reload();
            if(e.code === "ShiftLeft" || e.code === "ShiftRight") {
                if(gameState === "PLAYING") bullets.push({x: ship.x + (ship.dir === 1 ? 30 : 0), y: ship.y+7, vx: ship.dir*8}); // Slower player laser
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if(gameState !== "PLAYING") return;

            // Physics (Increased friction to 0.95 for better control)
            if(keys["ArrowUp"]) ship.vy -= 0.5;
            if(keys["ArrowDown"]) ship.vy += 0.5;
            if(keys["ArrowLeft"]) { ship.vx -= 0.5; ship.dir = -1; }
            if(keys["ArrowRight"]) { ship.vx += 0.5; ship.dir = 1; }

            ship.vx *= 0.95; ship.vy *= 0.95; 
            ship.x += ship.vx; ship.y += ship.vy;

            // Screen Wrap / Borders
            if(ship.x < 0) ship.x = canvas.width;
            if(ship.x > canvas.width) ship.x = 0;
            if(ship.y < 0) { ship.y = 0; ship.vy = 0; }
            if(ship.y > canvas.height-ship.h) { ship.y = canvas.height-ship.h; ship.vy = 0; }

            // Aliens & Slower AI Fire
            aliens.forEach((a, ai) => {
                a.x += a.vx; a.y += a.vy;
                if(a.x < 0 || a.x > canvas.width) a.vx *= -1;
                if(a.y < 0 || a.y > canvas.height-20) a.vy *= -1;

                if(Math.random() < 0.01) { // Reduced firing rate to 1%
                    // Slower enemy bullets (0.015 multiplier instead of 0.03)
                    enemyBullets.push({x: a.x, y: a.y, vx: (ship.x - a.x)*0.015, vy: (ship.y - a.y)*0.015});
                }

                if(Math.hypot(ship.x - a.x, ship.y - a.y) < 25) hit();
            });

            // Player Lasers
            bullets.forEach((b, bi) => {
                b.x += b.vx;
                aliens.forEach((a, ai) => {
                    if(Math.hypot(b.x - a.x, b.y - a.y) < 25) {
                        bullets.splice(bi, 1);
                        aliens.splice(ai, 1);
                        showData();
                    }
                });
                if(b.x < 0 || b.x > canvas.width) bullets.splice(bi, 1);
            });

            // Enemy Projectiles
            enemyBullets.forEach((eb, ebi) => {
                eb.x += eb.vx; eb.y += eb.vy;
                if(Math.hypot(ship.x - eb.x, ship.y - eb.y) < 18) {
                    enemyBullets.splice(ebi, 1);
                    hit();
                }
                // Clean up off-screen bullets
                if(eb.x < 0 || eb.x > canvas.width || eb.y < 0 || eb.y > canvas.height) enemyBullets.splice(ebi, 1);
            });

            render();
            requestAnimationFrame(update);
        }

        function hit() {
            lives--;
            document.getElementById("lives").innerText = lives;
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 150);
            ship.x = 100; ship.y = 300; ship.vx = 0; ship.vy = 0;
            if(lives <= 0) {
                gameState = "GAMEOVER";
                document.getElementById("topic-title").innerText = "MISSION FAILED";
                document.getElementById("paragraph-text").innerText = "THE DATA HAS BEEN ENCRYPTED. PRESS SPACE TO REBOOT.";
                overlay.style.display = "block";
            }
        }

        function showData() {
            gameState = "PAUSED";
            score++;
            document.getElementById("data").innerText = score + "/6";
            document.getElementById("topic-title").innerText = content[score-1].title;
            document.getElementById("paragraph-text").innerText = content[score-1].text;
            overlay.style.display = "block";
        }

        function resume() {
            overlay.style.display = "none";
            if(score === 6) {
                gameState = "WON";
                document.getElementById("topic-title").innerText = "MISSION SUCCESS";
                document.getElementById("paragraph-text").innerText = "YOU HAVE SECURED THE 80S TIMELINE.";
                overlay.style.display = "block";
            } else {
                gameState = "PLAYING";
                update();
            }
        }

        function render() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Ship (Cyan box with Red engine)
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(ship.x, ship.y, ship.w, ship.h);
            ctx.fillStyle = "red";
            ctx.fillRect(ship.x + (ship.dir === 1 ? 25 : -5), ship.y+4, 10, 7);

            // Aliens (Magenta circles)
            aliens.forEach(a => {
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath(); ctx.arc(a.x, a.y, 12, 0, 7); ctx.fill();
            });

            // Player Lasers (White)
            ctx.fillStyle = "white";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 20, 3));

            // Enemy Bullets (Slow Red dots)
            ctx.fillStyle = "red";
            enemyBullets.forEach(eb => {
                ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, 7); ctx.fill();
            });
        }

        spawnAliens();
        update();
    };
    </script>
</body>
</html>
