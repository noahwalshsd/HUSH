<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUSH - Dig Dug Edition</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ff8800;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        h1 { font-size: 3rem; text-shadow: 3px 3px #ff0000; margin-bottom: 10px; }
        #game-container { position: relative; border: 5px solid #ff8800; box-shadow: 0 0 20px #ff4400; }
        canvas { display: block; background-color: #1a0f0a; }
        #overlay {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 85%;
            background: rgba(0, 0, 0, 0.95); border: 3px solid #ff8800;
            padding: 25px; text-align: center; z-index: 10;
        }
        #overlay h2 { color: #ff8800; margin-top: 0; text-transform: uppercase; }
        #overlay p { color: #fff; line-height: 1.6; font-size: 1.1rem; }
        .instruction { color: #ff8800; font-weight: bold; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>HUSH</h1>
    <div id="game-container">
        <canvas id="digDugCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h2 id="topic-title"></h2>
            <p id="paragraph-text"></p>
            <div id="status-msg" class="instruction">PRESS SPACE TO CONTINUE</div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById("digDugCanvas");
            const ctx = canvas.getContext("2d");
            const overlay = document.getElementById("overlay");
            const paraText = document.getElementById("paragraph-text");
            const topicTitle = document.getElementById("topic-title");
            const statusMsg = document.getElementById("status-msg");

            const tileSize = 40;
            const gridRes = 10;
            let player, monsters, dirt, gameState, currentParaIndex;

            const content = [
                { title: "Top Gun", text: "Insert Top Gun text here..." },
                { title: "Star Wars", text: "Insert Star Wars text here..." },
                { title: "Michael Jordan", text: "Insert Michael Jordan text here..." },
                { title: "Michael Jackson", text: "Insert Michael Jackson text here..." },
                { title: "Atari", text: "Insert Atari text here..." },
                { title: "Air Jordan", text: "Insert Air Jordan text here..." }
            ];

            function init() {
                player = { x: 0, y: 0 };
                currentParaIndex = 0;
                gameState = "PLAYING";
                overlay.style.display = "none";
                
                dirt = [];
                for(let i=0; i<gridRes; i++) {
                    dirt[i] = [];
                    for(let j=0; j<gridRes; j++) { dirt[i][j] = true; }
                }
                dirt[0][0] = false;

                monsters = [];
                while(monsters.length < 6) {
                    let rx = Math.floor(Math.random() * gridRes);
                    let ry = Math.floor(Math.random() * gridRes);
                    if((rx !== 0 || ry !== 0) && !monsters.some(m => m.x === rx && m.y === ry)) {
                        monsters.push({ x: rx, y: ry });
                    }
                }
                render();
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw Dirt
                for(let i=0; i<gridRes; i++) {
                    for(let j=0; j<gridRes; j++) {
                        if(dirt[i][j]) {
                            ctx.fillStyle = "#8b4513"; 
                            ctx.fillRect(i*tileSize, j*tileSize, tileSize, tileSize);
                            ctx.strokeStyle = "#4b2c20";
                            ctx.strokeRect(i*tileSize, j*tileSize, tileSize, tileSize);
                        }
                    }
                }

                // Draw Monsters
                monsters.forEach(m => {
                    ctx.fillStyle = "#ff0000";
                    ctx.beginPath();
                    ctx.arc(m.x*tileSize + 20, m.y*tileSize + 20, 15, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.fillRect(m.x*tileSize + 12, m.y*tileSize + 15, 4, 4);
                    ctx.fillRect(m.x*tileSize + 24, m.y*tileSize + 15, 4, 4);
                });

                // Draw Player
                ctx.fillStyle = "#ffff00";
                ctx.fillRect(player.x*tileSize + 8, player.y*tileSize + 8, 24, 24);
                ctx.strokeStyle = "white";
                ctx.strokeRect(player.x*tileSize + 8, player.y*tileSize + 8, 24, 24);
            }

            document.addEventListener("keydown", (e) => {
                if (gameState === "WON" || (gameState === "PAUSED" && e.keyCode !== 32)) return;
                
                if (e.keyCode === 32) {
                    if (gameState === "PAUSED") resumeGame();
                    else if (gameState === "WON") init();
                    return;
                }

                if (gameState === "PLAYING") {
                    if (e.key === "ArrowUp" && player.y > 0) player.y--;
                    else if (e.key === "ArrowDown" && player.y < gridRes - 1) player.y++;
                    else if (e.key === "ArrowLeft" && player.x > 0) player.x--;
                    else if (e.key === "ArrowRight" && player.x < gridRes - 1) player.x++;

                    dirt[player.x][player.y] = false;

                    let mIdx = monsters.findIndex(m => m.x === player.x && m.y === player.y);
                    if (mIdx !== -1) {
                        monsters.splice(mIdx, 1);
                        showPrompt(content[currentParaIndex]);
                        currentParaIndex++;
                    }
                    render();
                }
            });

            function showPrompt(obj) {
                gameState = "PAUSED";
                topicTitle.innerText = obj.title;
                paraText.innerText = obj.text;
                overlay.style.display = "block";
            }

            function resumeGame() {
                if (currentParaIndex === 6) {
                    winGame();
                } else {
                    gameState = "PLAYING";
                    overlay.style.display = "none";
                    render();
                }
            }

            function winGame() {
                gameState = "WON";
                topicTitle.innerText = "YOU CLEARED THE LEVEL!";
                paraText.innerText = "You successfully dug through all the 80s milestones.";
                statusMsg.innerText = "PRESS SPACE TO RESTART";
                overlay.style.display = "block";
            }

            init();
        };
    </script>
</body>
</html>
